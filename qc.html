<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Kiểm tra chất lượng — QC</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--teal:#0f766e;--bg:#f8fafc;--txt:#1e293b;--muted:#64748b;--border:#e2e8f0;--red:#dc2626;--green:#16a34a;--amber:#d97706;--blue:#2563eb;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;padding:10px 12px;background:#fff;border-bottom:1px solid var(--border);gap:8px;position:sticky;top:0;z-index:10}
.topbar .ttl{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px}
.icon-btn:active{background:#f1f5f9}
.wrap{padding:12px;flex:1;overflow-y:auto}
.btn{border:none;padding:12px 20px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.btn:active{opacity:.85}
.btn.lg{padding:14px;font-size:18px}
.btn.green{background:var(--green);color:#fff}
.btn.teal{background:var(--teal);color:#fff}
.btn.red{background:var(--red);color:#fff}
.btn.gray{background:#e2e8f0;color:var(--txt)}
.btn.ghost{background:none;border:2px solid var(--border);color:var(--txt)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.hint{padding:10px 14px;border-radius:10px;font-size:14px;text-align:center;margin:8px 0}
.hint.info{background:#e0f2fe;color:#0369a1}
.hint.ok{background:#dcfce7;color:#15803d}
.hint.err{background:#fef2f2;color:var(--red)}
input,select,textarea{font-family:inherit;font-size:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;outline:none;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
.form-group textarea{resize:vertical;min-height:60px}

/* Chip chọn */
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-block;padding:8px 14px;border:2px solid var(--border);border-radius:20px;font-size:14px;cursor:pointer;background:#fff;font-weight:600;transition:all .15s}
.chip:active{opacity:.85}
.chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.chip.pass{border-color:var(--green);color:var(--green)}
.chip.pass.active{background:var(--green);color:#fff}
.chip.ng{border-color:var(--red);color:var(--red)}
.chip.ng.active{background:var(--red);color:#fff}

/* Card sản phẩm */
.product-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.product-card .pc-lsx{font-size:17px;font-weight:700}
.product-card .pc-info{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6}
.product-card .pc-info span{display:inline-block;margin-right:12px}

/* Scan QR */
#reader{width:100%;max-width:400px;margin:0 auto;border-radius:12px;overflow:hidden;position:relative}
#reader video{border-radius:12px}
#reader.scan-err{box-shadow:0 0 0 4px var(--red)}
#reader.scan-err::after{content:"";position:absolute;inset:0;background:rgba(220,38,38,.45);z-index:5;pointer-events:none;animation:errflash .28s ease 3}
@keyframes errflash{50%{background:rgba(220,38,38,.1)}}

/* NG form */
.ng-section{background:#fef2f2;border:2px solid #fecaca;border-radius:14px;padding:14px;margin-top:12px}
.ng-section h3{font-size:15px;color:var(--red);margin-bottom:10px}

/* Photo */
.photo-area{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:80px;height:80px;border-radius:10px;object-fit:cover;border:2px solid var(--border)}
.photo-add{width:80px;height:80px;border-radius:10px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted);cursor:pointer;background:#fff}
.photo-add:active{background:#f1f5f9}

/* ===== TRA CỨU ===== */
.filter-panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.f-group{margin-bottom:0}
.f-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase}
.f-group input,.f-group select{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;outline:none;background:#fff;font-size:14px;font-family:inherit}
.f-group input:focus,.f-group select:focus{border-color:var(--teal)}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sum-card{text-align:center;padding:10px 4px;border-radius:10px}
.sum-card .val{font-size:22px;font-weight:700}
.sum-card .lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:2px}
.sum-total{background:#eff6ff} .sum-total .val{color:var(--blue)}
.sum-pass{background:#f0fdf4} .sum-pass .val{color:var(--green)}
.sum-ng{background:#fef2f2} .sum-ng .val{color:var(--red)}
.sum-rate{background:#fffbeb} .sum-rate .val{color:var(--amber)}
.tc-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;background:#fff}
.tc-tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none}
.tc-tab.active{color:var(--teal);background:#f0fdfa;border-bottom:2px solid var(--teal)}
.lsx-card{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.lsx-head{display:flex;align-items:center;padding:10px 12px;gap:8px;cursor:pointer}
.lsx-head:active{background:#f8fafc}
.lsx-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;min-width:28px;text-align:center}
.lsx-badge.pass{background:#dcfce7;color:#15803d}
.lsx-badge.ng{background:#fecaca;color:var(--red)}
.lsx-info{flex:1}
.lsx-title{font-size:14px;font-weight:700}
.lsx-sub{font-size:12px;color:var(--muted);margin-top:2px}
.lsx-arrow{font-size:14px;color:var(--muted);transition:transform .2s}
.lsx-arrow.open{transform:rotate(90deg)}
.lsx-detail{display:none;padding:8px 12px 10px;border-top:1px dashed var(--border);background:#fafbfc}
.lsx-detail.show{display:block}
.err-chip{display:inline-block;font-size:11px;padding:3px 10px;border-radius:10px;margin:2px 3px 2px 0;font-weight:500}
.err-chip.catA{background:#fee2e2;color:#991b1b}
.err-chip.catB{background:#fef3c7;color:#92400e}
.err-chip.catC{background:#dbeafe;color:#1e40af}
.err-chip.catD{background:#f3e8ff;color:#6b21a8}
.detail-meta{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.7}
.detail-meta b{color:var(--txt)}
.chart-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.chart-box h4{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--muted)}

/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.overlay-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}}

/* Lightbox xem ảnh */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:70;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox .lb-close{position:absolute;top:12px;right:16px;font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.4);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.4);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.lightbox .lb-prev{left:12px}
.lightbox .lb-next{right:12px}
.lightbox .lb-counter{color:rgba(255,255,255,.7);font-size:13px}

/* Spinner */
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:60;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===== LIGHTBOX XEM ẢNH ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1, event)">‹</button>
  <img id="lbImg" src="" alt="Ảnh QC"/>
  <button class="lb-nav lb-next" onclick="lbNav(1, event)">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<!-- ===== SPINNER ===== -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner"></div>
  <div id="spinnerText" style="font-size:14px;color:var(--muted)">Đang xử lý...</div>
</div>

<!-- ===== SCREEN: HOME ===== -->
<div class="screen active" id="screenHome">
  <div class="topbar">
    <button class="icon-btn" onclick="goBack()">←</button>
    <div class="ttl">Kiểm tra chất lượng</div>
  </div>
  <div class="wrap">
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:14px;color:var(--muted)" id="homeUser"></div>
    </div>

    <!-- Scan hoặc nhập LSX -->
    <div style="margin-bottom:16px">
      <button class="btn lg teal" onclick="startScan()" id="btnScan">📷 Quét QR</button>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px">— hoặc —</div>
    <div class="form-group">
      <label>Nhập LSX CT</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="inputLSX" placeholder="Nhập mã LSX CT..."/>
        <button class="btn teal" style="width:auto;padding:10px 16px" onclick="manualSearchLSX()">Tìm</button>
      </div>
    </div>

    <!-- Kết quả tìm kiếm -->
  </div>
</div>

<!-- ===== SCREEN: INSPECTION FORM ===== -->
<div class="screen" id="screenInspect">
  <div class="topbar">
    <button class="icon-btn" onclick="backToHome()">←</button>
    <div class="ttl">Ghi nhận kiểm tra</div>
  </div>
  <div class="wrap">
    <!-- Thông tin LSX (từ QR scan hoặc nhập tay) -->
    <div class="product-card" id="productCard">
      <div class="pc-lsx" id="pcLSX">-</div>
    </div>

    <!-- Vị trí kiểm tra (từ MA_PhongBan) -->
    <div class="form-group">
      <label>Vị trí kiểm tra *</label>
      <select id="selViTri" onchange="onViTriChange()"><option value="">-- Chọn --</option></select>
    </div>

    <!-- Máy (SX) — có ô tìm kiếm -->
    <div class="form-group" id="grpMay" style="display:none">
      <label>Máy (SX)</label>
      <input type="text" id="searchMay" placeholder="Gõ để tìm máy..." oninput="filterMay()" style="margin-bottom:6px;font-size:14px;padding:8px 10px"/>
      <select id="selMay"><option value="">-- Chọn vị trí trước --</option></select>
    </div>
    <!-- Công nhân SX — có ô tìm kiếm -->
    <div class="form-group" id="grpCN" style="display:none">
      <label>Công nhân SX</label>
      <input type="text" id="searchCN" placeholder="Gõ để tìm công nhân..." oninput="filterCN()" style="margin-bottom:6px;font-size:14px;padding:8px 10px"/>
      <select id="selCN"><option value="">-- Chọn vị trí trước --</option></select>
    </div>

    <!-- SL kiểm tra, Số lỗi -->
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1">
        <label>SL kiểm tra *</label>
        <input type="number" id="inpSLKT" inputmode="numeric" min="0"/>
      </div>
      <div class="form-group" style="flex:1">
        <label>Số lỗi</label>
        <input type="number" id="inpSoLoi" inputmode="numeric" min="0" value="0"/>
      </div>
    </div>

    <!-- Phán định -->
    <div class="form-group">
      <label>Phán định *</label>
      <div class="chip-group" id="chipPhanDinh">
        <div class="chip pass" data-val="PASS" onclick="setPhanDinh('PASS')">✓ PASS</div>
        <div class="chip ng" data-val="NG" onclick="setPhanDinh('NG')">✗ NG</div>
      </div>
    </div>

    <!-- NG Section (ẩn khi PASS) -->
    <div class="ng-section" id="ngSection" style="display:none">
      <h3>Chi tiết lỗi</h3>

      <div class="form-group">
        <label>Nhóm lỗi (Category) *</label>
        <select id="selCategory" onchange="onCategoryChange()">
          <option value="">-- Chọn --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Loại lỗi (Group) *</label>
        <select id="selGroup">
          <option value="">-- Chọn category trước --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mô tả chi tiết</label>
        <textarea id="inpMoTaChiTiet" placeholder="Mô tả cụ thể lỗi phát hiện..."></textarea>
      </div>
      <div class="form-group">
        <label>Công đoạn gây lỗi</label>
        <select id="selCongDoanGayLoi"><option value="">-- Chọn --</option></select>
      </div>
      <div class="form-group">
        <label>Phương án xử lý</label>
        <select id="selPhuongAn">
          <option value="">-- Chọn --</option>
          <option value="Rework">Rework</option>
          <option value="Sort">Sort (phân loại)</option>
          <option value="Hold">Hold (tạm giữ)</option>
          <option value="Scrap">Scrap (hủy)</option>
          <option value="Chấp nhận sử dụng">Chấp nhận sử dụng</option>
          <option value="Trả NCC">Trả NCC</option>
          <option value="Chờ quyết định">Chờ quyết định</option>
        </select>
      </div>

      <!-- Ảnh -->
      <div class="form-group">
        <label>Ảnh bằng chứng</label>
        <div class="photo-area" id="photoArea">
          <div class="photo-add" onclick="takePhoto()">📷</div>
        </div>
        <input type="file" id="filePhoto" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)"/>
      </div>
    </div>

    <!-- Ghi chú -->
    <div class="form-group" style="margin-top:12px">
      <label>Ghi chú</label>
      <textarea id="inpGhiChu" placeholder="Ghi chú thêm (nếu có)..." rows="2"></textarea>
    </div>

    <!-- Nút submit -->
    <div style="padding:12px 0 24px">
      <button class="btn lg green" id="btnSubmit" onclick="submitInspection()">Gửi kết quả kiểm tra</button>
    </div>
  </div>
</div>

<!-- ===== SCREEN: QR SCAN ===== -->
<div class="screen" id="screenScan">
  <div class="topbar">
    <button class="icon-btn" onclick="stopScan();show('screenHome')">←</button>
    <div class="ttl">Quét QR</div>
  </div>
  <div class="wrap" style="display:flex;flex-direction:column;align-items:center;padding-top:20px">
    <div id="reader"></div>
    <div id="scanStatus" class="hint info" style="margin-top:12px">Đưa mã QR vào khung hình</div>
  </div>
</div>

<!-- ===== SCREEN: TRA CỨU KẾT QUẢ ===== -->
<div class="screen" id="screenTraCuu">
  <div class="topbar">
    <button class="icon-btn" onclick="goBack()">←</button>
    <div class="ttl">Tra cứu kết quả kiểm tra</div>
  </div>
  <div class="wrap">
    <div class="filter-panel">
      <div class="filter-row" style="margin-bottom:8px">
        <div class="f-group"><label>Từ ngày</label><input type="date" id="fFrom"/></div>
        <div class="f-group"><label>Đến ngày</label><input type="date" id="fTo"/></div>
      </div>
      <div class="filter-row" style="margin-bottom:8px">
        <div class="f-group"><label>Người kiểm tra</label><select id="fInspector"><option value="">Tất cả</option></select></div>
        <div class="f-group"><label>Vị trí kiểm tra</label><select id="fViTriTC"><option value="">Tất cả</option></select></div>
      </div>
      <div class="filter-row" style="margin-bottom:8px">
        <div class="f-group"><label>Công đoạn gây lỗi</label><select id="fCDGayLoi"><option value="">Tất cả</option></select></div>
        <div class="f-group"><label>LSX CT</label><input type="text" id="fLSX" placeholder="Nhập mã LSX..." style="font-size:14px"/></div>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">Nhóm lỗi</label>
        <div class="chip-group" id="catChips"></div>
      </div>
      <button class="btn teal" onclick="doSearch()">🔍 Tra cứu</button>
    </div>
    <div class="summary" id="summaryArea" style="display:none">
      <div class="sum-card sum-total"><div class="val" id="sumTotal">0</div><div class="lbl">TỔNG BẢN GHI</div></div>
      <div class="sum-card sum-pass"><div class="val" id="sumPass">0</div><div class="lbl">PASS</div></div>
      <div class="sum-card sum-ng"><div class="val" id="sumNG">0</div><div class="lbl">NG</div></div>
      <div class="sum-card sum-rate"><div class="val" id="sumRate">0%</div><div class="lbl">TỶ LỆ NG</div></div>
    </div>
    <div class="tc-tabs" id="tcTabBar" style="display:none">
      <div class="tc-tab active" data-tab="list" onclick="switchTab('list')">📋 Danh sách</div>
      <div class="tc-tab" data-tab="chart" onclick="switchTab('chart')">📊 Biểu đồ</div>
    </div>
    <div id="viewList"></div>
    <div id="viewChart" style="display:none">
      <div class="chart-box"><h4>Pareto lỗi (theo mã lỗi)</h4><canvas id="chartPareto" height="220"></canvas></div>
      <div class="chart-box"><h4>Tỷ lệ NG theo ngày</h4><canvas id="chartTrend" height="180"></canvas></div>
      <div class="chart-box"><h4>Phân bổ theo nhóm lỗi</h4><canvas id="chartCategory" height="180"></canvas></div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
// ⚠ Sau khi deploy Code_QC.gs, dán URL vào đây
const QC_URL = "https://script.google.com/macros/s/AKfycbx2gRrRi-DQ2ghO_AoM7W7L1mKA-odKOMnK42gE8t8acyIb-CVV8DKzeZKGyvD_TMVg/exec";

// ===== STATE =====
const state = {
  user: "",
  maNV: "",
  phanDinh: "",
  photos: [],
  photoUrls: [],
  masterData: null,
  currentProduct: null,
  _filteredMachines: [],
  _filteredWorkers: [],
  // Tra cứu
  results: [],
  mode: ""  // "" = kiểm tra, "tracuu" = tra cứu
};

// Category color mapping
const CAT_COLORS = { A: "#dc2626", B: "#d97706", C: "#2563eb", D: "#7c3aed" };
const CAT_CSS    = { A: "catA", B: "catB", C: "catC", D: "catD" };

// ===== INIT =====
window.addEventListener("DOMContentLoaded", function() {
  if (!checkSession()) { window.location.href = "index.html"; return; }

  // Detect mode from URL
  const params = new URLSearchParams(window.location.search);
  state.mode = params.get("mode") || "";

  if (state.mode === "tracuu") {
    show("screenTraCuu");
    setDefaultDates();
  } else {
    document.getElementById("homeUser").textContent = state.user;
  }
  loadMasterData();
});

function checkSession() {
  const saved = localStorage.getItem("ghinhan_session");
  if (!saved) return false;
  try {
    const s = JSON.parse(saved);
    if (s.username && s.ts && (Date.now() - s.ts < 8*3600*1000)) {
      state.user = s.user || s.username; state.maNV = s.maNV; return true;
    }
  } catch(e) {}
  return false;
}

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goBack() { window.location.href = "index.html"; }
function backToHome() { show("screenHome"); }
function showSpinner(txt) { document.getElementById("spinnerText").textContent = txt || "Đang xử lý..."; document.getElementById("spinnerOverlay").classList.add("show"); }
function hideSpinner() { document.getElementById("spinnerOverlay").classList.remove("show"); }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ===== API =====
async function apiGet(action, params) {
  if (!QC_URL) { alert("Chưa cấu hình QC_URL. Vui lòng deploy Code_QC.gs trước."); throw new Error("No URL"); }
  let url = QC_URL + "?action=" + action;
  if (params) Object.keys(params).forEach(k => { url += "&" + k + "=" + encodeURIComponent(params[k]); });
  const resp = await fetch(url);
  return resp.json();
}
async function apiPost(body) {
  if (!QC_URL) { alert("Chưa cấu hình QC_URL."); throw new Error("No URL"); }
  const resp = await fetch(QC_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(body)
  });
  const text = await resp.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    console.error("apiPost parse error:", text.substring(0, 500));
    throw new Error("Server trả lỗi, không phải JSON");
  }
}

// ===== MASTER DATA =====
async function loadMasterData() {
  try {
    // Cache localStorage 10 phút
    const cacheKey = "qc_master_cache";
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try {
        const c = JSON.parse(cached);
        if (c.ts && Date.now() - c.ts < 600000) {
          state.masterData = c.data; buildViTriSelect(); buildCategorySelect();
          if (state.mode === "tracuu") { buildTraCuuDropdowns(c.data); buildCategoryChips(c.data.categories); }
          return;
        }
      } catch(e) {}
    }

    const res = await apiGet("masterData");
    if (res.result === "ok") {
      state.masterData = res;
      localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: res }));
      buildViTriSelect();
      buildCategorySelect();
      if (state.mode === "tracuu") { buildTraCuuDropdowns(res); buildCategoryChips(res.categories); }
    }
  } catch(e) { console.error("Load master data failed:", e); }
}

// ===== QR SCAN =====
let qrScanner = null;

function startScan() {
  show("screenScan");
  document.getElementById("scanStatus").textContent = "Đang khởi động camera...";
  document.getElementById("scanStatus").className = "hint info";

  if (qrScanner) { try { qrScanner.stop(); } catch(e) {} }

  qrScanner = new Html5Qrcode("reader");
  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onQrSuccess,
    () => {}
  ).then(() => {
    document.getElementById("scanStatus").textContent = "Đưa mã QR vào khung hình";
  }).catch(err => {
    document.getElementById("scanStatus").textContent = "Không mở được camera: " + err;
    document.getElementById("scanStatus").className = "hint err";
  });
}

function stopScan() {
  if (qrScanner) { try { qrScanner.stop(); } catch(e) {} qrScanner = null; }
}

let lastQR = "", lastQRTime = 0;
function onQrSuccess(text) {
  // Debounce: bỏ qua nếu cùng mã trong 3 giây
  if (text === lastQR && Date.now() - lastQRTime < 3000) return;
  lastQR = text; lastQRTime = Date.now();

  // Parse QR: loại 1 = LSX/SL/ĐVT/KL (4 phần), loại 2 = LSX/KL (2 phần)
  const parts = text.split("/");
  let lsxct = "";

  if (parts.length >= 4) {
    // Loại 1: LSX/SL/ĐVT/KL
    lsxct = parts[0].trim();
  } else if (parts.length === 2) {
    // Loại 2: LSX/KL
    lsxct = parts[0].trim();
  } else {
    flashError("QR không hợp lệ: " + text);
    return;
  }

  if (!lsxct) { flashError("Không đọc được LSX từ QR"); return; }

  stopScan();
  searchAndOpenInspection(lsxct);
}

function flashError(msg) {
  const el = document.getElementById("reader");
  el.classList.add("scan-err");
  document.getElementById("scanStatus").textContent = msg;
  document.getElementById("scanStatus").className = "hint err";
  if (navigator.vibrate) navigator.vibrate([300, 120, 300]);
  setTimeout(() => el.classList.remove("scan-err"), 900);
}

// ===== PHOTO (có nén ảnh) =====
const IMG_MAX_SIZE = 800;  // max chiều dài/rộng (px) — giảm từ 1200 để upload nhanh hơn
const IMG_QUALITY  = 0.5;  // JPEG quality — giảm từ 0.6 để file nhỏ hơn (~80-120KB)

function takePhoto() {
  document.getElementById("filePhoto").click();
}

function onPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = "";

  const origSize = (file.size / 1024).toFixed(0);
  showSpinner("Đang nén ảnh (" + origSize + " KB)...");

  compressImage(file, IMG_MAX_SIZE, IMG_QUALITY).then(dataUrl => {
    hideSpinner();
    const compSize = (dataUrl.length * 3 / 4 / 1024).toFixed(0);
    console.log("Ảnh: " + origSize + " KB → ~" + compSize + " KB");
    state.photos.push({ dataUrl: dataUrl, filename: "qc_" + Date.now() + ".jpg" });
    renderPhotos();
  }).catch(err => {
    hideSpinner();
    alert("Lỗi nén ảnh: " + err.message);
  });
}

function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      // Resize nếu vượt maxSize
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else       { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", quality);
      resolve(dataUrl);
    };
    img.onerror = () => reject(new Error("Không đọc được ảnh"));
    img.src = URL.createObjectURL(file);
  });
}

function renderPhotos() {
  const area = document.getElementById("photoArea");
  area.innerHTML = "";
  state.photos.forEach((p, idx) => {
    area.innerHTML += '<img class="photo-thumb" src="' + p.dataUrl + '" onclick="removePhoto(' + idx + ')"/>';
  });
  area.innerHTML += '<div class="photo-add" onclick="takePhoto()">📷</div>';
}

function removePhoto(idx) {
  if (confirm("Xóa ảnh này?")) {
    state.photos.splice(idx, 1);
    renderPhotos();
  }
}

// ===== SUBMIT =====
async function submitInspection() {
  // Validate
  const selVT = document.getElementById("selViTri");
  const viTriKT = selVT.value;
  const viTriTen = viTriKT ? selVT.options[selVT.selectedIndex].dataset.ten : "";
  const slKT = document.getElementById("inpSLKT").value;
  const phanDinh = state.phanDinh;

  if (!viTriKT) { alert("Chọn vị trí kiểm tra"); return; }
  if (!slKT || parseFloat(slKT) <= 0) { alert("Nhập số lượng kiểm tra"); return; }
  if (!phanDinh) { alert("Chọn phán định PASS hoặc NG"); return; }

  let maLoi = "", moTaLoi = "";
  if (phanDinh === "NG") {
    const catId = document.getElementById("selCategory").value;
    const grpId = document.getElementById("selGroup").value;
    if (!catId || !grpId) { alert("Chọn nhóm lỗi và loại lỗi"); return; }
    maLoi = grpId;
    const grpSel = document.getElementById("selGroup");
    moTaLoi = grpSel.options[grpSel.selectedIndex].dataset.name || "";
  }

  showSpinner("Đang lưu kết quả...");

  try {
    // Bước 1: Submit trước để lấy KiemTraID
    const p = state.currentProduct || {};
    const row = {
      inspector: state.user,
      lsxct: p.lsxct || "",
      congDoanKT: viTriTen,
      may: document.getElementById("selMay").value,
      congNhan: document.getElementById("selCN").value,
      slKiemTra: parseFloat(slKT) || 0,
      soLoi: parseFloat(document.getElementById("inpSoLoi").value) || 0,
      phanDinh: phanDinh,
      maLoi: maLoi,
      moTaLoi: moTaLoi,
      moTaChiTiet: document.getElementById("inpMoTaChiTiet").value.trim(),
      congDoanGayLoi: phanDinh === "NG" ? document.getElementById("selCongDoanGayLoi").value : "",
      phuongAnXuLy: phanDinh === "NG" ? document.getElementById("selPhuongAn").value : "",
      ghiChu: document.getElementById("inpGhiChu").value.trim(),
      linkAnh: ""
    };

    const res = await apiPost({ action: "submit", rows: [row] });

    if (res.result !== "ok") {
      hideSpinner();
      alert("Lỗi ghi nhận: " + (res.error || "Không rõ"));
      return;
    }

    // Lấy KiemTraID (nếu backend mới trả ids)
    const kiemTraId = (res.ids && res.ids.length > 0) ? res.ids[0] : "";

    // Bước 2: Upload ảnh SONG SONG (tất cả cùng lúc, nhanh hơn gấp N lần)
    let linkAnh = "";
    if (state.photos.length > 0) {
      showSpinner("Đang upload " + state.photos.length + " ảnh...");
      const uploadPromises = state.photos.map((photo, i) => {
        const seq = ("00" + (i + 1)).slice(-2);
        const photoName = kiemTraId
          ? (kiemTraId + "-" + seq + ".jpg")
          : ("qc_" + Date.now() + "_" + seq + ".jpg");
        const upBody = { action: "uploadPhoto", dataUrl: photo.dataUrl, filename: photoName };
        if (kiemTraId) { upBody.prefix = kiemTraId; upBody.seq = seq; }
        return apiPost(upBody)
          .then(r => r.result === "ok" && r.url ? { url: r.url, name: r.filename || photoName } : { error: "Ảnh " + (i+1) + ": " + (r.error || "lỗi") })
          .catch(e => ({ error: "Ảnh " + (i+1) + ": " + String(e) }));
      });

      const results = await Promise.all(uploadPromises);
      const urls = [], names = [], failedUploads = [];
      results.forEach(r => {
        if (r.url) { urls.push(r.url); names.push(r.name); }
        else { failedUploads.push(r.error); }
      });

      linkAnh = urls.join(" | ");
      const tenAnh = names.join(" | ");

      // Bước 3: Cập nhật link ảnh + tên ảnh vào bản ghi
      if (linkAnh && kiemTraId) {
        try {
          await apiPost({ action: "updateLinkAnh", kiemTraId: kiemTraId, linkAnh: linkAnh, tenAnh: tenAnh });
        } catch(ulErr) { console.error("updateLinkAnh error:", ulErr); }
      }

      if (failedUploads.length > 0) {
        alert("Upload ảnh thất bại:\n" + failedUploads.join("\n"));
      }
    }

    hideSpinner();

    if (res.result === "ok") {
      if (phanDinh === "NG") {
        // Auto-tạo NG Report DRAFT
        showSpinner("Đang tạo NG Report...");
        try {
          const catSel = document.getElementById("selCategory");
          const grpSel = document.getElementById("selGroup");
          const catId = catSel.value;
          const catName = catId && catSel.selectedIndex > 0 ? catSel.options[catSel.selectedIndex].textContent.split(" - ").slice(1).join(" - ") : "";
          const grpId = grpSel.value;
          const grpName = grpId && grpSel.selectedIndex > 0 ? (grpSel.options[grpSel.selectedIndex].dataset.name || "") : "";

          const ngBody = {
            action: "createNGReport",
            user: state.user,
            submitNow: false,
            lsx: p.lsxct || "",
            maSP: p.masp || "",
            khachHang: p.khachhang || "",
            moTa: p.mota || "",
            dvt: p.dvt || "",
            soLuongYeuCau: p.soluong || 0,
            congDoanKiemTra: viTriTen,
            may: document.getElementById("selMay").value,
            congNhanSX: document.getElementById("selCN").value,
            soLuongKiemTra: parseFloat(slKT) || 0,
            soLoi: parseFloat(document.getElementById("inpSoLoi").value) || 0,
            defectCategoryID: catId,
            defectCategoryName: catName,
            defectGroupID: grpId,
            defectGroupName: grpName,
            defectDescription: document.getElementById("inpMoTaChiTiet").value.trim(),
            congDoanGayLoi: document.getElementById("selCongDoanGayLoi").value,
            phuongAnXuLy: document.getElementById("selPhuongAn").value,
            linkAnh: linkAnh,
            ghiChu: document.getElementById("inpGhiChu").value.trim()
          };
          const ngRes = await apiPost(ngBody);
          hideSpinner();
          if (ngRes.result === "ok" && ngRes.reportId) {
            window.location.href = "ng-report.html?mode=continue&id=" + encodeURIComponent(ngRes.reportId);
            return;
          }
        } catch(ngErr) {
          hideSpinner();
          console.error("Auto-create NG Report error:", ngErr);
        }
        alert("Đã ghi nhận NG. Tạo NG Report tự động thất bại — vui lòng tạo thủ công.");
        show("screenHome");
      } else {
        alert("Đã ghi nhận " + phanDinh + " thành công!");
        show("screenHome");
      }
    } else {
      alert("Lỗi: " + (res.error || "Không xác định"));
    }
  } catch(e) {
    hideSpinner();
    alert("Lỗi kết nối: " + e.message);
  }
}

let _lbUrls = [], _lbIdx = 0;

// Chuyển URL Drive cũ sang URL xem trực tiếp
function toDirectImgUrl(url) {
  if (!url) return "";
  // Đã là lh3 URL → giữ nguyên
  if (url.indexOf("lh3.googleusercontent.com") !== -1) return url;
  // drive.google.com/file/d/FILE_ID/... → lh3
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return "https://lh3.googleusercontent.com/d/" + m[1];
  // drive.google.com/open?id=FILE_ID → lh3
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return "https://lh3.googleusercontent.com/d/" + m2[1];
  return url;
}

function openLightbox(urls, startIdx) {
  _lbUrls = urls.map(toDirectImgUrl);
  _lbIdx = startIdx || 0;
  showLbImage();
  document.getElementById("lightbox").classList.add("show");
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById("lightbox") && e.target.tagName !== "BUTTON") return;
  document.getElementById("lightbox").classList.remove("show");
}

function lbNav(dir, e) {
  if (e) e.stopPropagation();
  _lbIdx = (_lbIdx + dir + _lbUrls.length) % _lbUrls.length;
  showLbImage();
}

function showLbImage() {
  document.getElementById("lbImg").src = _lbUrls[_lbIdx];
  document.getElementById("lbCounter").textContent = (_lbIdx + 1) + " / " + _lbUrls.length;
  document.querySelector(".lb-prev").style.display = _lbUrls.length > 1 ? "" : "none";
  document.querySelector(".lb-next").style.display = _lbUrls.length > 1 ? "" : "none";
}

    chip.dataset.catId = c.id;
    chip.textContent = c.name;

async function doSearch() {
  const fromVal = document.getElementById("fFrom").value;
  const toVal = document.getElementById("fTo").value;
  if (!fromVal) { alert("Vui lòng chọn ngày bắt đầu"); return; }

  const from = fromVal.split("-").reverse().join("/");
  const to = toVal ? toVal.split("-").reverse().join("/") : from;

  const activeChips = document.querySelectorAll("#catChips .chip.active");
  const catIds = Array.from(activeChips).map(c => c.dataset.catId).join(",");

  const params = {
    from: from, to: to,
    inspector: document.getElementById("fInspector").value,
    viTri: document.getElementById("fViTriTC").value,
    congDoanGayLoi: document.getElementById("fCDGayLoi").value,
    category: catIds,
    lsx: document.getElementById("fLSX").value.trim()
  };

  showSpinner("Đang tra cứu...");
  try {
    const res = await apiGet("searchQC", params);
    hideSpinner();
    if (res.result !== "ok") { alert(res.error || "Lỗi"); return; }

    state.results = res.list || [];
    updateSummary(res.summary);
    updateInspectorDropdown(state.results);
    renderList(state.results);
    renderCharts(state.results);

    document.getElementById("summaryArea").style.display = "";
    document.getElementById("tcTabBar").style.display = "";
  } catch(e) {
    hideSpinner();
    alert("Lỗi kết nối: " + e.message);
  }
}

function updateSummary(s) {
  document.getElementById("sumTotal").textContent = s.total;
  document.getElementById("sumPass").textContent = s.pass;
  document.getElementById("sumNG").textContent = s.ng;
  const rate = s.total > 0 ? Math.round(s.ng / s.total * 100) : 0;
  document.getElementById("sumRate").textContent = rate + "%";
}

function updateInspectorDropdown(list) {
  const sel = document.getElementById("fInspector");
  const current = sel.value;
  if (sel.options.length > 1) return;
  const inspectors = [...new Set(list.map(r => r.inspector).filter(Boolean))].sort();
  inspectors.forEach(name => { const o = document.createElement("option"); o.value = name; o.textContent = name; sel.appendChild(o); });
  if (current) sel.value = current;
}

function switchTab(tab) {
  document.querySelectorAll(".tc-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  document.getElementById("viewList").style.display = tab === "list" ? "" : "none";
  document.getElementById("viewChart").style.display = tab === "chart" ? "" : "none";
}

// ===== LIST VIEW — grouped by LSX =====
function renderList(list) {
  const container = document.getElementById("viewList");
  if (!list || list.length === 0) {
    container.innerHTML = '<div class="hint info">Không có dữ liệu phù hợp</div>';
    return;
  }

  const groups = {}; const order = [];
  list.forEach(r => {
    if (!groups[r.lsxct]) { groups[r.lsxct] = []; order.push(r.lsxct); }
    groups[r.lsxct].push(r);
  });

  let html = "";
  order.forEach(lsx => {
    const items = groups[lsx];
    const first = items[0];
    const hasNG = items.some(r => r.phanDinh === "NG");
    const totalLoi = items.reduce((s,r) => s + (Number(r.soLoi)||0), 0);
    const badgeClass = hasNG ? "ng" : "pass";
    const badgeText = hasNG ? "NG" : "OK";
    const subParts = [];
    if (first.masp) subParts.push(esc(first.masp));
    if (first.khachhang) subParts.push("KH: " + esc(first.khachhang));
    subParts.push(items.length + " lần KT");
    if (totalLoi > 0) subParts.push(totalLoi + " lỗi");

    html += '<div class="lsx-card"><div class="lsx-head" onclick="toggleDetail(this)">';
    html += '<span class="lsx-badge ' + badgeClass + '">' + badgeText + '</span>';
    html += '<div class="lsx-info"><div class="lsx-title">' + esc(lsx) + '</div>';
    html += '<div class="lsx-sub">' + subParts.join(" · ") + '</div></div>';
    html += '<span class="lsx-arrow">▸</span></div>';

    html += '<div class="lsx-detail">';
    items.forEach(r => {
      const isNG = r.phanDinh === "NG";
      if (isNG && r.maLoi) {
        const catCss = CAT_CSS[r.categoryId] || "catA";
        html += '<span class="err-chip ' + catCss + '">' +
          (r.categoryName ? esc(r.categoryName) + " · " : "") +
          esc(r.moTaLoi || r.maLoi) +
          (r.congDoanGayLoi ? " · CĐ: " + esc(r.congDoanGayLoi) : "") + '</span>';
      }
      html += '<div class="detail-meta"><b>' + esc(r.phanDinh) + '</b> · ' +
        esc(r.ngay) + ' ' + esc(r.gio) + ' · NV: <b>' + esc(r.inspector) + '</b>' +
        ' · CĐ KT: ' + esc(r.congDoanKT || "") +
        (r.may ? ' · Máy: ' + esc(r.may) : '') +
        ' · SL KT: ' + (r.slKiemTra || 0) +
        (isNG ? ' · Lỗi: <b>' + (r.soLoi || 0) + '</b> (' + esc(r.tyLeNG || "") + ')' : '') +
        (r.phuongAnXuLy ? ' · XL: ' + esc(r.phuongAnXuLy) : '') +
        (r.ghiChu ? ' · Ghi chú: ' + esc(r.ghiChu) : '') +
        (r.linkAnh ? ' · <a href="javascript:void(0)" onclick="openLightbox(\'' + esc(r.linkAnh).replace(/'/g,"\\'") + '\'.split(\' | \'),0);event.stopPropagation()" style="color:var(--blue)">📷 Xem ảnh</a>' : '') +
        '</div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleDetail(head) {
  head.nextElementSibling.classList.toggle("show");
  head.querySelector(".lsx-arrow").classList.toggle("open");
}

// ===== CHARTS =====
let chartPareto = null, chartTrend = null, chartCategory = null;

function renderCharts(list) { renderPareto(list); renderTrend(list); renderCategoryChart(list); }

function renderPareto(list) {
  const ngItems = list.filter(r => r.phanDinh === "NG" && r.maLoi);
  const counts = {};
  ngItems.forEach(r => { const key = r.moTaLoi || r.maLoi; counts[key] = (counts[key]||0) + (Number(r.soLoi)||1); });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,10);
  if (sorted.length === 0) { destroyChart("chartPareto"); return; }
  const labels = sorted.map(e => e[0]), values = sorted.map(e => e[1]);
  const total = values.reduce((a,b) => a+b, 0);
  let cum = 0;
  const cumPct = values.map(v => { cum+=v; return Math.round(cum/total*100); });
  if (chartPareto) chartPareto.destroy();
  chartPareto = new Chart(document.getElementById("chartPareto"), {
    type: "bar",
    data: { labels, datasets: [
      { label: "Số lỗi", data: values, backgroundColor: "#ef4444", borderRadius: 4, order: 2 },
      { label: "Tích lũy %", data: cumPct, type: "line", borderColor: "#2563eb", pointRadius: 3, yAxisID: "pct", order: 1 }
    ]},
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: { beginAtZero: true, title: { display: true, text: "Số lỗi", font: { size: 11 } } },
        pct: { position: "right", min: 0, max: 100, title: { display: true, text: "%", font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

function renderTrend(list) {
  const byDate = {};
  list.forEach(r => { if (!byDate[r.ngay]) byDate[r.ngay] = { total: 0, ng: 0 }; byDate[r.ngay].total++; if (r.phanDinh === "NG") byDate[r.ngay].ng++; });
  const dates = Object.keys(byDate).sort((a,b) => { const pa=a.split("/"),pb=b.split("/"); return (pa[2]+pa[1]+pa[0]).localeCompare(pb[2]+pb[1]+pb[0]); });
  if (dates.length === 0) { destroyChart("chartTrend"); return; }
  const rates = dates.map(d => Math.round(byDate[d].ng/byDate[d].total*100));
  if (chartTrend) chartTrend.destroy();
  chartTrend = new Chart(document.getElementById("chartTrend"), {
    type: "line",
    data: { labels: dates, datasets: [{ label: "Tỷ lệ NG (%)", data: rates, borderColor: "#dc2626", backgroundColor: "rgba(220,38,38,.1)", fill: true, tension: .3, pointRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: "% NG", font: { size: 11 } } }, x: { ticks: { font: { size: 10 } } } }
    }
  });
}

function renderCategoryChart(list) {
  const ngItems = list.filter(r => r.phanDinh === "NG" && r.categoryId);
  const counts = {};
  ngItems.forEach(r => { const key = r.categoryName || r.categoryId || "Khác"; counts[key] = (counts[key]||0) + (Number(r.soLoi)||1); });
  const labels = Object.keys(counts), values = Object.values(counts);
  if (labels.length === 0) { destroyChart("chartCategory"); return; }
  const bgColors = labels.map(lbl => { const item = ngItems.find(r => (r.categoryName||r.categoryId) === lbl); return item ? (CAT_COLORS[item.categoryId]||"#94a3b8") : "#94a3b8"; });
  if (chartCategory) chartCategory.destroy();
  chartCategory = new Chart(document.getElementById("chartCategory"), {
    type: "doughnut",
    data: { labels, datasets: [{ data: values, backgroundColor: bgColors }] },
    options: { responsive: true, plugins: { legend: { position: "bottom", labels: { font: { size: 12 }, padding: 12 } } } }
  });
}

function destroyChart(id) {
  const c = document.getElementById(id); if (c) { const ctx = c.getContext("2d"); ctx.clearRect(0,0,c.width,c.height); }
}

</script>
