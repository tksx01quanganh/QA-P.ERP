<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f766e" />
<title>Tra cứu tiến độ đơn hàng — QA-P.ERP</title>
<style>
:root{
  --teal:#0f766e; --teal-d:#0b5b54; --green:#16a34a; --red:#dc2626;
  --amber:#d97706; --gray:#64748b; --bg:#f1f5f9; --card:#fff;
  --txt:#0f172a; --muted:#64748b; --border:#e2e8f0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;}

.screen{display:none;height:100%;flex-direction:column;}
.screen.active{display:flex;}

/* ── topbar ──────────────────────────────── */
.topbar{background:var(--teal);color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.topbar h1{margin:0;font-size:16px;font-weight:700;}
.topbar .info{flex:1;min-width:0;}
.icon-btn{background:rgba(255,255,255,.2);border:0;color:#fff;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}

/* ── login ──────────────────────────────── */
.login-scroll{flex:1;overflow:auto;}
.login-wrap{max-width:400px;margin:60px auto;padding:20px;}
.login-wrap h2{text-align:center;color:var(--teal);margin:0 0 6px;}
.login-wrap .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
.field input{width:100%;padding:11px 12px;font-size:16px;border:2px solid var(--border);border-radius:10px;background:#fff;}
.field input:focus{outline:none;border-color:var(--teal);}
.login-err{color:var(--red);font-size:14px;font-weight:600;display:none;padding:4px 0;text-align:center;}
.btn{border:0;border-radius:12px;font-size:18px;font-weight:700;padding:16px 18px;cursor:pointer;width:100%;color:#fff;background:var(--teal);}
.btn:active{transform:scale(.98);}
.btn.green{background:var(--green);}
.btn:disabled{opacity:.5;}
.spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .8s linear infinite;vertical-align:-3px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── search area (sticky) ────────────────── */
.searchArea{flex-shrink:0;background:var(--bg);padding:10px 12px 8px;border-bottom:1px solid var(--border);}
.searchBar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.searchBar .field{flex:1;min-width:140px;margin-bottom:0;}
.searchBar label{margin-bottom:4px;}
.searchBar input{padding:10px 11px;font-size:15px;}
.btnRow{display:flex;align-items:flex-end;gap:6px;}
.btn-sm{border:0;border-radius:10px;font-size:14px;font-weight:700;padding:10px 16px;cursor:pointer;color:#fff;background:var(--teal);white-space:nowrap;width:auto;}
.btn-sm:active{transform:scale(.98);}
.btn-sm.gray{background:var(--gray);}
.summary{font-size:12px;color:var(--muted);margin:6px 2px 0;min-height:18px;}

/* ── results (scrollable) ────────────────── */
.resultArea{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 20px;}

.status{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;}
.status.err{color:var(--red);font-weight:600;}

/* ── cards (mobile-friendly) ─────────────── */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.oc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.oc-lsx{font-family:ui-monospace,Consolas,monospace;font-size:14px;font-weight:700;color:var(--teal-d);}
.oc-lsx-parent{font-size:11px;color:var(--muted);font-family:ui-monospace,Consolas,monospace;}
.oc-customer{font-size:12px;font-weight:700;color:var(--txt);text-align:right;max-width:45%;}
.oc-body{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:13px;margin-bottom:10px;}
.oc-field{color:var(--muted);}
.oc-field b{color:var(--txt);}
.oc-progress{}
.progBar{height:8px;border-radius:5px;background:#e2e8f0;overflow:hidden;margin-bottom:4px;}
.progBar .fill{height:100%;border-radius:5px;transition:width .3s;}
.progTxt{font-size:12px;font-weight:700;}
.progTxt.low{color:var(--red);}
.progTxt.mid{color:var(--amber);}
.progTxt.done{color:var(--green);}
.progDetail{font-size:11px;color:var(--muted);}

.empty{text-align:center;color:var(--muted);padding:40px 20px;}
.footer-note{text-align:center;color:var(--muted);font-size:11px;padding:12px 10px 20px;}
.no-access{text-align:center;color:var(--red);font-weight:600;padding:40px 20px;font-size:16px;}

@media (max-width:500px){
  .searchBar{flex-direction:column;}
  .btnRow{width:100%;}
  .btnRow .btn-sm{flex:1;}
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     SCREEN: Đăng nhập
════════════════════════════════════════════ -->
<section id="screenLogin" class="screen active">
  <div class="topbar"><div class="info"><h1>📊 Tiến độ đơn hàng</h1></div></div>
  <div class="login-scroll">
    <div class="login-wrap">
      <h2>Đăng nhập</h2>
      <p class="sub">Đăng nhập để xem tiến độ đơn hàng</p>
      <div class="field">
        <label>Username</label>
        <input id="loginUser" type="text" autocapitalize="none" autocomplete="username" placeholder="VD: tuyenpv" />
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <input id="loginPass" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" />
      </div>
      <div id="loginErr" class="login-err"></div>
      <button id="loginBtn" class="btn green" onclick="doLogin()" style="margin-top:6px">Đăng nhập</button>
    </div>
  </div>
</section>

<!-- ════════════════════════════════════════════
     SCREEN: Nội dung tra cứu
════════════════════════════════════════════ -->
<section id="screenMain" class="screen">
  <!-- Topbar — fixed -->
  <div class="topbar">
    <button class="icon-btn" onclick="goBack()">←</button>
    <div class="info"><h1>📊 Tiến độ đơn hàng</h1></div>
    <button class="icon-btn" onclick="goHome()">🏠</button>
  </div>

  <!-- Search area — fixed -->
  <div class="searchArea">
    <div class="searchBar">
      <div class="field">
        <label>Khách hàng</label>
        <input id="fCustomer" list="customerList" type="text" placeholder="Gõ hoặc chọn..." />
        <datalist id="customerList"></datalist>
      </div>
      <div class="field">
        <label>LSX / Mã SP / Mô tả</label>
        <input id="fQuery" type="text" placeholder="VD: 26062919001..." />
      </div>
      <div class="btnRow">
        <button class="btn-sm" onclick="runSearch()">Tìm kiếm</button>
        <button class="btn-sm gray" onclick="clearSearch()">Xóa</button>
      </div>
    </div>
    <div id="summary" class="summary"></div>
  </div>

  <!-- Results — scrollable -->
  <div class="resultArea" id="resultArea">
    <div id="statusBox" class="status">Nhập Khách hàng hoặc LSX rồi bấm "Tìm kiếm"</div>
    <div id="resultList"></div>
    <div class="footer-note">Dữ liệu KH lấy từ Order List (cache 30 phút). Tiến độ = SL ghi nhận / SL đặt hàng.</div>
  </div>
</section>

<script>
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbweJ234d0G0CTZfSwd21tX-EzWq29K-XHELqBh0ho0MQv2YMJ1-9nv0ZHz_Mv9_V_Ns/exec"
};

/* ── Utils ─────────────────────────────────── */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ══════════════════════════════════════════════
   ĐĂNG NHẬP
══════════════════════════════════════════════ */
function loginSetErr(msg){
  const el=document.getElementById("loginErr");
  if(msg){ el.textContent=msg; el.style.display="block"; }
  else { el.textContent=""; el.style.display="none"; }
}

async function doLogin(){
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value;
  loginSetErr("");
  if(!username || !password){ loginSetErr("Vui lòng nhập đủ Username và Mật khẩu"); return; }

  const btn = document.getElementById("loginBtn");
  const oldTxt = btn.textContent;
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Đang đăng nhập...';

  try{
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"login", username, password}),
      redirect:"follow"
    });
    const out = await res.json();
    if(out.result==="ok"){
      const permissions = out.permissions || [];
      const hasTDSX = permissions.length === 0 || permissions.some(p => p.url === "tien-do.html");
      if(!hasTDSX){
        loginSetErr("Bạn không có quyền truy cập chức năng này.");
        btn.disabled=false; btn.textContent=oldTxt;
        return;
      }
      sessionStorage.setItem("ghinhan_session", JSON.stringify({
        user: out.ten || username,
        maNV: out.maNV || "",
        username: out.username || username,
        permissions: permissions,
        ts: Date.now()
      }));
      localStorage.setItem("ghinhan_last_username", username);
      document.getElementById("loginPass").value="";
      btn.disabled=false; btn.textContent=oldTxt;
      enterMain();
    } else {
      loginSetErr(out.error || "Đăng nhập thất bại");
      btn.disabled=false; btn.textContent=oldTxt;
    }
  }catch(e){
    loginSetErr("Không kết nối được máy chủ.");
    btn.disabled=false; btn.textContent=oldTxt;
  }
}

function goBack(){
  // Quay lại màn hình trước đó (history back)
  if(window.history.length > 1){
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
}

function goHome(){
  // Về thẳng màn hình chính (module grid)
  window.location.href = "index.html";
}

function prefillLastUsername(){
  const last = localStorage.getItem("ghinhan_last_username");
  if(last) document.getElementById("loginUser").value = last;
}

function enterMain(){
  showScreen("screenMain");
  loadCustomers();
}

/* ══════════════════════════════════════════════
   TRA CỨU — Tối ưu tốc độ
══════════════════════════════════════════════ */
let abortCtrl = null; // để hủy request cũ nếu bấm tìm lại

async function apiFetch(action, params){
  // Hủy request trước nếu đang chạy
  if(abortCtrl) try{ abortCtrl.abort(); }catch(e){}
  abortCtrl = new AbortController();

  const sep = CONFIG.APPS_SCRIPT_URL.includes("?") ? "&" : "?";
  let url = CONFIG.APPS_SCRIPT_URL + sep + "action=" + action + "&t=" + Date.now();
  if(params){
    Object.keys(params).forEach(k=>{ url += "&" + k + "=" + encodeURIComponent(params[k]||""); });
  }
  const res = await fetch(url, {method:"GET", redirect:"follow", signal:abortCtrl.signal});
  return res.json();
}

let customerCache = null;

async function loadCustomers(){
  if(customerCache){
    fillCustomerList(customerCache);
    return;
  }
  try{
    const data = await apiFetch("orderCustomers");
    const list = data.customers || [];
    customerCache = list;
    fillCustomerList(list);
  }catch(e){}
}

function fillCustomerList(list){
  const dl = document.getElementById("customerList");
  dl.innerHTML = list.map(c=>'<option value="'+esc(c)+'">').join("");
}

function setStatus(kind, msg){
  const box = document.getElementById("statusBox");
  box.style.display = "block";
  box.className = "status" + (kind==="err" ? " err" : "");
  box.innerHTML = msg;
  document.getElementById("resultList").innerHTML = "";
}

function progressClass(pct){
  if(pct >= 100) return "done";
  if(pct >= 50) return "mid";
  return "low";
}
function progressColor(pct){
  if(pct >= 100) return "var(--green)";
  if(pct >= 50) return "var(--amber)";
  return "var(--red)";
}

/* ── Render cards — batch DOM insert cho nhanh ── */
function renderRows(rows){
  if(!rows.length){
    setStatus("", '<div class="empty">Không tìm thấy đơn hàng phù hợp.</div>');
    document.getElementById("summary").textContent = "";
    return;
  }
  document.getElementById("statusBox").style.display = "none";
  document.getElementById("summary").textContent =
    rows.length + " dòng LSX" + (rows.length>=300 ? " (giới hạn 300)" : "");

  // Build HTML string — nhanh hơn nhiều so với createElement từng cái
  const parts = [];
  for(let i = 0; i < rows.length; i++){
    const r = rows[i];
    const soLuong = Number(r.soluong)||0;
    const daCat   = Number(r.daCatSoLuong)||0;
    const pct     = soLuong>0 ? Math.round((daCat/soLuong)*1000)/10 : 0;
    const pctBar  = Math.min(pct, 100);
    const cls     = progressClass(pct);
    const color   = progressColor(pct);

    parts.push(
      '<div class="order-card">'+
        '<div class="oc-header">'+
          '<div><div class="oc-lsx">'+esc(r.lsxct)+'</div>'+
          '<div class="oc-lsx-parent">LSX: '+esc(r.lsx)+'</div></div>'+
          '<div class="oc-customer">'+esc(r.khachhang||"—")+'</div>'+
        '</div>'+
        '<div class="oc-body">'+
          '<div class="oc-field">SP: <b>'+esc(r.masp||"—")+'</b></div>'+
          '<div class="oc-field">'+esc(r.mota||"")+'</div>'+
          '<div class="oc-field">SL: <b>'+(soLuong?soLuong.toLocaleString("vi-VN"):"—")+' '+esc(r.dvt||"")+'</b></div>'+
          '<div class="oc-field">Giao: <b>'+esc(r.ngaygiao||"—")+'</b></div>'+
        '</div>'+
        '<div class="oc-progress">'+
          '<div class="progBar"><div class="fill" style="width:'+pctBar+'%;background:'+color+'"></div></div>'+
          '<div class="progTxt '+cls+'">'+daCat.toLocaleString("vi-VN")+' / '+soLuong.toLocaleString("vi-VN")+' ('+pct+'%)</div>'+
          '<div class="progDetail">'+(Number(r.daCatKg)||0).toLocaleString("vi-VN")+' kg · '+(r.soDongGhiNhan||0)+' lượt</div>'+
        '</div>'+
      '</div>'
    );
  }

  const list = document.getElementById("resultList");
  list.innerHTML = parts.join("");

  // Scroll lên đầu danh sách
  document.getElementById("resultArea").scrollTop = 0;
}

async function runSearch(){
  const customer = document.getElementById("fCustomer").value.trim();
  const q = document.getElementById("fQuery").value.trim();
  setStatus("", '<span class="spin"></span> Đang tìm kiếm...');
  document.getElementById("summary").textContent = "";

  try{
    const data = await apiFetch("orderSearch", {customer, q});
    if(data.result === "ok"){
      renderRows(data.rows || []);
    } else {
      setStatus("err", "Lỗi: " + esc(data.error||"không xác định"));
    }
  }catch(e){
    if(e.name === "AbortError") return; // bị hủy do bấm tìm lại
    setStatus("err", "Không kết nối được. Kiểm tra mạng và thử lại.");
  }
}

function clearSearch(){
  document.getElementById("fCustomer").value = "";
  document.getElementById("fQuery").value = "";
  document.getElementById("resultList").innerHTML = "";
  document.getElementById("summary").textContent = "";
  setStatus("", 'Nhập Khách hàng hoặc LSX rồi bấm "Tìm kiếm"');
}

/* ══════════════════════════════════════════════
   KHỞI ĐỘNG
══════════════════════════════════════════════ */
document.getElementById("loginUser").addEventListener("keydown", e=>{
  if(e.key==="Enter") document.getElementById("loginPass").focus();
});
document.getElementById("loginPass").addEventListener("keydown", e=>{
  if(e.key==="Enter") doLogin();
});
document.getElementById("fQuery").addEventListener("keydown", e=>{ if(e.key==="Enter") runSearch(); });
document.getElementById("fCustomer").addEventListener("keydown", e=>{ if(e.key==="Enter") runSearch(); });

function checkExistingSession(){
  try{
    const raw = sessionStorage.getItem("ghinhan_session");
    if(!raw) return false;
    const s = JSON.parse(raw);
    if(Date.now() - s.ts > 8*60*60*1000) return false;
    const perms = s.permissions || [];
    if(perms.length > 0 && !perms.some(p => p.url === "tien-do.html")) return false;
    return true;
  }catch(e){ return false; }
}

function boot(){
  prefillLastUsername();
  if(checkExistingSession()){
    enterMain();
  } else {
    showScreen("screenLogin");
  }
}

boot();
</script>
</body>
</html>
