<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f766e"/>

  <!-- Scissors handles (rings) and blades -->
  <g stroke="white" stroke-width="26" stroke-linecap="round" fill="none">
    <!-- Top ring -->
    <circle cx="118" cy="155" r="50"/>
    <!-- Bottom ring -->
    <circle cx="118" cy="298" r="50"/>
    <!-- Upper blade: from top-ring edge diagonally to bottom-right -->
    <line x1="160" y1="173" x2="408" y2="295"/>
    <!-- Lower blade: from bottom-ring edge diagonally to top-right -->
    <line x1="160" y1="280" x2="408" y2="158"/>
  </g>

  <!-- Pivot screw where blades cross -->
  <circle cx="284" cy="227" r="16" fill="#0f766e" stroke="white" stroke-width="5"/>

  <!-- CAT+TC label -->
  <text
    x="256" y="450"
    text-anchor="middle"
    font-size="90"
    font-weight="bold"
    fill="white"
    font-family="Arial, sans-serif"
    letter-spacing="-2">CAT+TC</text>
</svg>
