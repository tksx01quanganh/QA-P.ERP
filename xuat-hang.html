<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Đối chiếu Xuất hàng</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--teal:#0f766e;--bg:#f8fafc;--txt:#1e293b;--muted:#64748b;--border:#e2e8f0;--red:#dc2626;--green:#16a34a;--amber:#d97706;--blue:#2563eb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);-webkit-tap-highlight-color:transparent;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
.topbar{display:flex;align-items:center;padding:10px 12px;background:#fff;border-bottom:1px solid var(--border);gap:8px;position:sticky;top:0;z-index:10;}
.topbar .ttl{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;}
.icon-btn:active{background:#f1f5f9;}
.wrap{padding:12px;flex:1;overflow-y:auto;}
.search-box{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-size:16px;outline:none;margin-bottom:10px;}
.search-box:focus{border-color:var(--teal);}
/* Accordion DN */
.dn-acc{border:2px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;background:#fff;}
.dn-acc.completed{opacity:.7;border-color:#bbf7d0;}
.dn-hdr{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:8px;}
.dn-hdr:active{background:#f8fafc;}
.dn-tri{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0;width:16px;text-align:center;}
.dn-tri.open{transform:rotate(90deg);}
.dn-hdr-info{flex:1;min-width:0;}
.dn-title-row{display:flex;align-items:center;gap:8px;}
.dn-code{font-size:17px;font-weight:700;}
.dn-kh{font-size:13px;color:var(--muted);}
.dn-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.dn-count{font-size:12px;color:var(--teal);font-weight:600;}
.dn-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;}
.st-done{background:#dcfce7;color:#15803d;}
.st-partial{background:#fef3c7;color:#92400e;}
.st-new{background:#e0f2fe;color:#0369a1;}
.dn-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border);}
.dn-body.open{display:block;}
.dn-lsx-item{background:#f8fafc;border-radius:10px;padding:10px 12px;margin-top:8px;}
.dn-lsx-item.done{background:#f0fdf4;border:1px solid #bbf7d0;}
.dn-lsx-head{display:flex;justify-content:space-between;align-items:center;}
.dn-lsx-code{font-weight:700;font-size:15px;}
.dn-lsx-prog{font-size:13px;color:var(--muted);}
.dn-lsx-scanner{font-size:12px;color:var(--muted);margin-top:3px;}
.dn-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.dn-act-btn{border:none;padding:8px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;flex:1;text-align:center;}
.dn-act-btn:active{opacity:.85;}
.dn-act-btn.scan{background:var(--green);color:#fff;}
.dn-act-btn.hist{background:#e0f2fe;color:#0369a1;}
.lsx-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;}
.badge-ok{background:#e0f2fe;color:#0369a1;}
.badge-done{background:#bbf7d0;color:#15803d;}
.badge-over{background:#fecaca;color:var(--red);}
.filter-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.filter-bar label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer;}
.filter-bar input[type=checkbox]{width:16px;height:16px;}
/* Scan screen */
.lsx-item{background:#fff;border:2px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.lsx-item.done{border-color:var(--green);background:#f0fdf4;}
.lsx-item.over{border-color:var(--red);background:#fef2f2;}
.lsx-head{display:flex;justify-content:space-between;align-items:center;}
.lsx-code{font-size:16px;font-weight:700;}
.lsx-bars{margin-top:8px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:13px;}
.bar-label{width:28px;font-weight:600;color:var(--muted);flex-shrink:0;}
.bar-track{flex:1;height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .3s;}
.fill-ok{background:var(--green);}
.fill-over{background:var(--red);}
.bar-text{font-size:12px;color:var(--muted);white-space:nowrap;min-width:80px;text-align:right;}
.btn{border:none;padding:12px 20px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;}
.btn:active{opacity:.85;}
.btn.lg{padding:14px;font-size:18px;}
.btn.green{background:var(--green);color:#fff;}
.btn.teal{background:var(--teal);color:#fff;}
.btn.gray{background:#e2e8f0;color:var(--txt);}
.btn.ghost{background:none;border:2px solid var(--border);color:var(--txt);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.controls{padding:12px;display:flex;flex-direction:column;gap:8px;background:#fff;border-top:1px solid var(--border);}
.row2{display:flex;gap:8px;}
.row2 .btn{flex:1;}
.hint{padding:10px 14px;border-radius:10px;font-size:14px;text-align:center;margin:8px 0;}
.hint.info{background:#e0f2fe;color:#0369a1;}
.hint.ok{background:#dcfce7;color:#15803d;}
.hint.err{background:#fef2f2;color:var(--red);}
#reader{width:100%;max-width:400px;margin:0 auto;border-radius:12px;overflow:hidden;}
#reader video{border-radius:12px;}
.scan-section{margin-top:12px;border-top:2px solid var(--border);padding-top:10px;}
.scan-section h4{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.scan-row{display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:4px;gap:8px;}
.scan-row .sr-lsx{font-weight:700;flex:1;}
.scan-row .sr-sl{font-size:14px;color:var(--teal);font-weight:600;min-width:50px;text-align:right;}
.scan-row .sr-del{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 6px;color:var(--red);border-radius:6px;}
.scan-row .sr-del:active{background:#fef2f2;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 28px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;}
.sheet h3{font-size:18px;margin-bottom:12px;}
.field{margin-bottom:12px;}
.field label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-size:16px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--teal);}
.manual-err{color:var(--red);font-size:13px;margin-top:4px;display:none;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.summary{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.sum-chip{font-size:13px;font-weight:600;padding:4px 10px;border-radius:8px;}
.chip-total{background:#e0f2fe;color:#0369a1;}
.chip-done{background:#dcfce7;color:#15803d;}
.chip-remain{background:#fef3c7;color:#92400e;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;}
.spin{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.hist-row{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.hist-lsx{font-weight:700;font-size:15px;}
.hist-detail{font-size:13px;color:var(--muted);margin-top:2px;}
.hist-empty{text-align:center;color:var(--muted);font-size:14px;padding:20px;}
.loading-text{text-align:center;color:var(--muted);padding:12px;font-size:14px;}
</style>
</head>
<body>

<!-- SCREEN 1: Chọn DN -->
<section id="screenDN" class="screen active">
  <div class="topbar">
    <button class="icon-btn" onclick="goHome()">&#8592;</button>
    <div class="ttl">&#128230; Đối chiếu Xuất hàng</div>
    <button class="icon-btn" onclick="goHome()" title="Trang chủ">&#127968;</button>
  </div>
  <div class="wrap">
    <input id="searchDN" class="search-box" type="text" placeholder="Tìm theo mã DN, khách hàng hoặc LSX..." oninput="filterDN(this.value)" />
    <div class="filter-bar">
      <label><input type="checkbox" id="chkHideDone" onchange="filterDN(document.getElementById('searchDN').value)"> Ẩn DN đã hoàn thành</label>
    </div>
    <div id="dnStatus" class="hint info" style="display:none">Đang tải danh sách DN...</div>
    <div id="dnList"></div>
  </div>
</section>

<!-- SCREEN 2: Quét hàng -->
<section id="screenScan" class="screen">
  <div class="topbar">
    <button class="icon-btn" onclick="backToDN()">&#8592;</button>
    <div class="ttl">&#128203; <span id="dnTitle">-</span></div>
    <button class="icon-btn" onclick="refreshDN()" title="Tải lại">&#128260;</button>
    <button class="icon-btn" onclick="openHistory()" title="Lịch sử">&#128337;</button>
    <button class="icon-btn" onclick="goHome()" title="Trang chủ">&#127968;</button>
  </div>
  <div class="summary" id="summaryBar"></div>
  <div class="wrap" id="mainWrap">
    <div id="lsxWrap"></div>
    <div id="scanSection" class="scan-section" style="display:none">
      <h4>&#128221; Đã scan/nhập trong phiên này (<span id="scanCount">0</span>)</h4>
      <div id="scanListEl"></div>
    </div>
  </div>
  <div id="reader"></div>
  <div id="hint" class="hint info" style="margin:0 12px">Bấm "Bắt đầu quét" để mở camera</div>
  <div class="controls" id="scanControls">
    <button id="btnScan" class="btn lg green" onclick="startOrNext()">Bắt đầu quét</button>
    <div class="row2">
      <button class="btn ghost" onclick="openManual()">&#9999;&#65039; Nhập thủ công</button>
      <button id="btnSubmit" class="btn teal" onclick="submitAll()" style="display:none">&#128228; Gửi kết quả</button>
    </div>
  </div>
</section>

<!-- SCREEN 3: Lịch sử DN -->
<section id="screenHistory" class="screen">
  <div class="topbar">
    <button class="icon-btn" onclick="backFromHistory()">&#8592;</button>
    <div class="ttl">&#128337; Lịch sử <span id="histTitle">-</span></div>
    <button class="icon-btn" onclick="goHome()" title="Trang chủ">&#127968;</button>
  </div>
  <div class="wrap">
    <div id="histContent"></div>
  </div>
</section>

<!-- OVERLAY: Nhập thủ công -->
<div id="manualOverlay" class="overlay">
  <div class="sheet">
    <h3>&#9999;&#65039; Nhập thủ công</h3>
    <div class="field">
      <label>Mã LSX</label>
      <select id="mLSX"><option value="">- Chọn LSX -</option></select>
    </div>
    <div class="field">
      <label>Số lượng</label>
      <input id="mSL" type="number" inputmode="numeric" placeholder="VD: 500" min="1" />
    </div>
    <div id="manualErr" class="manual-err"></div>
    <div class="row2" style="margin-top:12px">
      <button class="btn gray" onclick="closeManual()">Huỷ</button>
      <button class="btn green" onclick="submitManual()">&#10003; Xác nhận</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const CONFIG = {
  XUAT_HANG_URL: "https://script.google.com/macros/s/AKfycbw0ILLVOhQGGjrtr4gpAAr1NBB44fHKpvP248rnddJvqHctfHj_85plkz3pCmXtGp1G-Q/exec"
};

let state = {
  user: null, maNV: null, currentDN: null, sessionId: "",
  allDN: [], scanList: [], historyFrom: "scan", expandedDN: {}
};
let filteredList = [];
let qr = null, scanning = false, scanLocked = true, lastText = "";

function checkSession(){
  const saved = sessionStorage.getItem("ghinhan_session");
  if(!saved) return false;
  try{
    const s = JSON.parse(saved);
    if(s.username && s.ts && (Date.now() - s.ts < 8*3600*1000)){
      state.user = s.user; state.maNV = s.maNV; return true;
    }
  }catch(e){}
  return false;
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goHome(){ window.location.href = "index.html"; }
function backToDN(){
  if(state.scanList.length > 0 && !confirm("Bạn có "+state.scanList.length+" mục chưa gửi. Quay lại sẽ mất dữ liệu. Tiếp tục?")) return;
  stopCamera(); state.currentDN = null; state.scanList = []; show("screenDN");
}
function showToast(msg, dur){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"), dur||3000);
}
function setHint(cls, msg){
  const h=document.getElementById("hint");
  h.className="hint "+cls; h.textContent=msg; h.style.margin="0 12px";
}

let audioCtx=null;
function ac(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} return audioCtx;}
function tone(freq,dur,when){const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.frequency.value=freq;o.connect(g);g.connect(c.destination);const t=c.currentTime+(when||0);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.3,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur+.02);}
function buzz(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}
const FB={
  ok(){tone(1175,.12,0);tone(1568,.14,.13);buzz([60,40,90]);},
  err(){tone(200,.16,0);tone(200,.16,.22);buzz([40,40,40]);},
  warn(){tone(440,.2,0);buzz(200);}
};

/* === SCREEN 1: DN LIST (ACCORDION) === */
async function loadDnList(){
  const el=document.getElementById("dnStatus");
  el.style.display="block"; el.textContent="Đang tải..."; el.className="hint info";
  try{
    const res = await fetch(CONFIG.XUAT_HANG_URL+"?action=dnlist&t="+Date.now());
    const out = await res.json();
    if(out.result==="ok"){
      state.allDN = out.list||[];
      state.expandedDN = {};
      filterDN(""); el.style.display="none";
    } else { el.textContent = out.error||"Lỗi"; el.className="hint err"; }
  }catch(e){ el.textContent="Không kết nối được."; el.className="hint err"; }
}

function filterDN(q){
  q=(q||"").toLowerCase();
  const hideDone = document.getElementById("chkHideDone").checked;
  filteredList = state.allDN.filter(d=>{
    const s = (d.dn+" "+d.kh+" "+(d.lsxList||[]).join(" ")).toLowerCase();
    return s.includes(q);
  });
  if(hideDone) filteredList = filteredList.filter(d=>d.status !== "done");
  renderDnList(filteredList);
}

function renderDnList(list){
  const wrap=document.getElementById("dnList");
  if(!list.length){
    wrap.innerHTML='<div class="empty">Không có DN nào.</div>';
    return;
  }
  wrap.innerHTML="";
  list.forEach((d, idx)=>{
    const acc=document.createElement("div");
    acc.className="dn-acc"+(d.status==="done"?" completed":"");

    let statusHtml = '';
    if(d.status==="done") statusHtml='<span class="dn-status st-done">Hoàn thành</span>';
    else if(d.status==="partial") statusHtml='<span class="dn-status st-partial">Đang thực hiện</span>';
    else statusHtml='<span class="dn-status st-new">Chưa bắt đầu</span>';

    acc.innerHTML=
      '<div class="dn-hdr" onclick="toggleDN('+idx+')">'+
        '<span class="dn-tri" id="tri_'+idx+'">&#9654;</span>'+
        '<div class="dn-hdr-info">'+
          '<div class="dn-title-row">'+
            '<span class="dn-code">'+esc(d.dn)+'</span>'+
            '<span class="dn-kh">— '+esc(d.kh)+'</span>'+
          '</div>'+
          '<div class="dn-meta">'+
            '<span class="dn-count">'+d.soLSX+' LSX</span>'+
            statusHtml+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="dn-body" id="body_'+idx+'"></div>';

    wrap.appendChild(acc);
  });
}

async function toggleDN(idx){
  const d = filteredList[idx];
  if(!d) return;
  const body = document.getElementById("body_"+idx);
  const tri = document.getElementById("tri_"+idx);

  if(body.classList.contains("open")){
    body.classList.remove("open"); tri.classList.remove("open");
    return;
  }

  // Close others
  document.querySelectorAll(".dn-body.open").forEach(b=>{
    b.classList.remove("open");
    const id = b.id.replace("body_","");
    const t = document.getElementById("tri_"+id);
    if(t) t.classList.remove("open");
  });

  tri.classList.add("open");
  body.classList.add("open");

  if(!state.expandedDN[d.dn]){
    body.innerHTML='<div class="loading-text">Đang tải...</div>';
    try{
      const res = await fetch(CONFIG.XUAT_HANG_URL+"?action=dndetail&dn="+encodeURIComponent(d.dn)+"&t="+Date.now());
      const out = await res.json();
      if(out.result==="ok"){
        state.expandedDN[d.dn] = out;
        renderAccBody(idx, out, d);
      } else {
        body.innerHTML='<div class="loading-text" style="color:var(--red)">'+esc(out.error)+'</div>';
      }
    }catch(e){
      body.innerHTML='<div class="loading-text" style="color:var(--red)">Không kết nối được</div>';
    }
  } else {
    renderAccBody(idx, state.expandedDN[d.dn], d);
  }
}

function renderAccBody(idx, data, d){
  const body = document.getElementById("body_"+idx);
  const allDone = data.items.every(it => it.slDone >= it.slYC);
  let html = '';

  data.items.forEach(it=>{
    const pct = it.slYC > 0 ? Math.min(it.slDone/it.slYC*100, 100) : 0;
    const isDone = it.slDone >= it.slYC;
    const isOver = it.slDone > it.slYC;

    let badge = '';
    if(isOver) badge='<span class="lsx-badge badge-over">VƯỢT</span>';
    else if(isDone) badge='<span class="lsx-badge badge-done">ĐỦ</span>';
    else badge='<span class="lsx-badge badge-ok">'+Math.round(pct)+'%</span>';

    let scannerInfo = '';
    if(it.lastUser) scannerInfo='<div class="dn-lsx-scanner">Gần nhất: '+esc(it.lastUser)+' — '+esc(it.lastTime||'')+'</div>';

    html += '<div class="dn-lsx-item'+(isDone?' done':'')+'">'+
      '<div class="dn-lsx-head">'+
        '<span class="dn-lsx-code">'+esc(it.lsx)+'</span>'+
        badge+
      '</div>'+
      '<div class="dn-lsx-prog">'+fmt(it.slDone)+' / '+fmt(it.slYC)+'</div>'+
      scannerInfo+
    '</div>';
  });

  html += '<div class="dn-actions">';
  if(!allDone){
    html += '<button class="dn-act-btn scan" onclick="openDN(\''+escAttr(data.dn)+'\')">&#128247; Quét hàng</button>';
  }
  if(d.status !== "new"){
    html += '<button class="dn-act-btn hist" onclick="openHistoryFromList(\''+escAttr(data.dn)+'\')">&#128337; Xem lịch sử</button>';
  }
  html += '</div>';

  body.innerHTML = html;
}

/* === SCREEN 2: SCAN === */
async function openDN(dnCode){
  show("screenScan");
  document.getElementById("dnTitle").textContent=dnCode;
  document.getElementById("lsxWrap").innerHTML='<div class="hint info">Đang tải...</div>';
  document.getElementById("summaryBar").innerHTML="";
  setHint("info","Đang tải dữ liệu DN...");
  state.sessionId = dnCode+"_"+Date.now();
  state.scanList = [];
  try{
    const res = await fetch(CONFIG.XUAT_HANG_URL+"?action=dndetail&dn="+encodeURIComponent(dnCode)+"&t="+Date.now());
    const out = await res.json();
    if(out.result==="ok"){
      state.currentDN = out;
      const allDone = out.items.every(it=>it.slDone>=it.slYC);
      document.getElementById("scanControls").style.display = allDone ? "none" : "";
      document.getElementById("hint").style.display = allDone ? "none" : "";
      renderAll();
      if(!allDone) setHint("info",'Bấm "Bắt đầu quét" để mở camera');
    } else {
      document.getElementById("lsxWrap").innerHTML='<div class="hint err">'+esc(out.error)+'</div>';
      setHint("err", out.error);
    }
  }catch(e){
    document.getElementById("lsxWrap").innerHTML='<div class="hint err">Không kết nối được.</div>';
    setHint("err","Lỗi mạng");
  }
}

async function refreshDN(){
  if(!state.currentDN) return;
  if(state.scanList.length > 0 && !confirm("Tải lại sẽ xoá "+state.scanList.length+" mục chưa gửi. Tiếp tục?")) return;
  const dnCode = state.currentDN.dn;
  state.scanList = [];
  state.expandedDN = {};
  showToast("Đang tải lại...", 2000);
  await openDN(dnCode);
}

function renderAll(){
  renderProgress();
  renderScanList();
  document.getElementById("btnSubmit").style.display = state.scanList.length > 0 ? "" : "none";
}

function renderProgress(){
  const dn = state.currentDN;
  if(!dn) return;
  const wrap=document.getElementById("lsxWrap");
  wrap.innerHTML="";
  let totalLSX=dn.items.length, doneLSX=0;
  dn.items.forEach(it=>{
    const sessionSL = state.scanList.filter(s=>s.lsx===it.lsx).reduce((a,s)=>a+s.sl,0);
    const totalDone = it.slDone + sessionSL;
    const pct = it.slYC>0 ? Math.min(totalDone/it.slYC*100, 100) : 0;
    const isDone = totalDone >= it.slYC;
    const isOver = totalDone > it.slYC;
    if(isDone) doneLSX++;
    const cls = isOver?"lsx-item over":(isDone?"lsx-item done":"lsx-item");
    const badge = isOver?'<span class="lsx-badge badge-over">VƯỢT</span>'
                : isDone?'<span class="lsx-badge badge-done">ĐỦ</span>'
                : '<span class="lsx-badge badge-ok">'+Math.round(pct)+'%</span>';
    const div=document.createElement("div");
    div.className=cls;
    div.innerHTML=
      '<div class="lsx-head"><span class="lsx-code">'+esc(it.lsx)+'</span>'+badge+'</div>'+
      '<div class="lsx-bars">'+
        '<div class="bar-row"><span class="bar-label">SL</span>'+
          '<div class="bar-track"><div class="bar-fill '+(isOver?"fill-over":"fill-ok")+'" style="width:'+Math.min(pct,100)+'%"></div></div>'+
          '<span class="bar-text">'+fmt(totalDone)+' / '+fmt(it.slYC)+'</span></div>'+
      '</div>';
    wrap.appendChild(div);
  });
  document.getElementById("summaryBar").innerHTML=
    '<span class="sum-chip chip-total">'+totalLSX+' LSX</span>'+
    '<span class="sum-chip chip-done">'+doneLSX+' đủ</span>'+
    '<span class="sum-chip chip-remain">'+(totalLSX-doneLSX)+' còn thiếu</span>';
}

function renderScanList(){
  const section = document.getElementById("scanSection");
  const listEl = document.getElementById("scanListEl");
  const countEl = document.getElementById("scanCount");
  if(state.scanList.length === 0){ section.style.display = "none"; return; }
  section.style.display = "";
  countEl.textContent = state.scanList.length;
  listEl.innerHTML = "";
  for(let i = state.scanList.length - 1; i >= 0; i--){
    const s = state.scanList[i];
    const row = document.createElement("div");
    row.className = "scan-row";
    row.innerHTML =
      '<span class="sr-lsx">'+esc(s.lsx)+'</span>'+
      '<span class="sr-sl">'+fmt(s.sl)+'</span>'+
      '<button class="sr-del" data-idx="'+i+'">&#10005;</button>';
    listEl.appendChild(row);
  }
  listEl.querySelectorAll(".sr-del").forEach(btn=>{
    btn.onclick=function(){
      const idx = parseInt(this.getAttribute("data-idx"));
      if(confirm("Xoá dòng "+state.scanList[idx].lsx+" (SL: "+fmt(state.scanList[idx].sl)+")?")){
        state.scanList.splice(idx, 1); renderAll();
      }
    };
  });
}

/* === QR SCAN === */
async function startOrNext(){
  if(scanning){ scanLocked=false; lastText=""; document.getElementById("btnScan").textContent="Đang quét..."; setHint("info","Đưa QR vào khung để quét"); return; }
  await startCamera();
}
async function startCamera(){
  try{
    qr=new Html5Qrcode("reader",{verbose:false});
    await qr.start({facingMode:"environment"},{fps:10,qrbox:{width:240,height:240},aspectRatio:1.0},onScan,()=>{});
    scanning=true; scanLocked=false; lastText="";
    document.getElementById("btnScan").textContent="Đang quét...";
    setHint("info","Đưa QR vào khung để quét");
  }catch(e){ setHint("err","Không mở được camera."); }
}
function stopCamera(){
  if(qr&&scanning){qr.stop().then(()=>{try{qr.clear();}catch(e){}}).catch(()=>{});}
  scanning=false; scanLocked=true;
}
function onScan(text){
  if(scanLocked) return;
  text=(text||"").trim().toUpperCase();
  if(!text||text===lastText) return;
  lastText=text; scanLocked=true; processQR(text);
}

function parseQR(text){
  const parts=text.split("/");
  if(parts.length < 2) return null;
  const lsx = parts[0].trim();
  const sl = parseFloat(String(parts[1]).replace(",","."));
  if(!lsx || isNaN(sl) || sl <= 0) return null;
  return { raw: text, lsx: lsx, sl: sl };
}

function processQR(text){
  const parsed=parseQR(text);
  if(!parsed){ FB.err(); setHint("err","QR không hợp lệ"); document.getElementById("btnScan").textContent="Quét tiếp"; return; }
  addScanItem(parsed.lsx, parsed.sl, parsed.raw);
}

function addScanItem(lsx, sl, qrRaw){
  const dn=state.currentDN;
  if(!dn||!dn.items){ FB.err(); setHint("err","Chưa tải được dữ liệu DN"); return; }
  const item = dn.items.find(it=>it.lsx===lsx);
  if(!item){ FB.err(); setHint("err","LSX "+esc(lsx)+" không có trong DN này!"); document.getElementById("btnScan").textContent="Quét tiếp"; return; }
  const sessionSL = state.scanList.filter(s=>s.lsx===lsx).reduce((a,s)=>a+s.sl, 0);
  const totalAfter = item.slDone + sessionSL + sl;
  if(totalAfter > item.slYC){
    FB.err();
    setHint("err","VƯỢT SL! Tổng sẽ là "+fmt(totalAfter)+" > YC: "+fmt(item.slYC));
    document.getElementById("btnScan").textContent="Quét tiếp"; return;
  }
  const isDone = totalAfter >= item.slYC;
  if(isDone){ FB.ok(); setHint("ok",""+lsx+" — ĐÃ ĐỦ SL! ("+fmt(totalAfter)+"/"+fmt(item.slYC)+")"); }
  else { FB.ok(); setHint("ok","Ghi nhận "+lsx+" +"+fmt(sl)+" (tổng: "+fmt(totalAfter)+"/"+fmt(item.slYC)+")"); }
  state.scanList.push({ lsx: lsx, sl: sl, qr: qrRaw || (lsx+"/"+sl), time: nowStr() });
  renderAll();
  document.getElementById("btnScan").textContent="Quét tiếp";
}

/* === SUBMIT === */
async function submitAll(){
  if(state.scanList.length === 0){ showToast("Chưa có dữ liệu", 2000); return; }
  if(!confirm("Gửi "+state.scanList.length+" mục lên Google Sheet?")) return;
  const dn = state.currentDN;
  const btn = document.getElementById("btnSubmit");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Đang gửi...';
  const summaryMap = {};
  dn.items.forEach(it=>{
    const sessionSL = state.scanList.filter(s=>s.lsx===it.lsx).reduce((a,s)=>a+s.sl, 0);
    summaryMap[it.lsx] = { lsx: it.lsx, slYC: it.slYC, slThucTe: it.slDone + sessionSL };
  });
  const payload = {
    action: "submit", dn: dn.dn, sessionId: state.sessionId,
    user: state.user || "", time: nowStr(),
    scanRows: state.scanList.map(s=>({ lsx: s.lsx, qr: s.qr, sl: s.sl, time: s.time })),
    summary: Object.values(summaryMap)
  };
  try{
    const res = await fetch(CONFIG.XUAT_HANG_URL, {
      method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload), redirect:"follow"
    });
    const out = await res.json();
    if(out.result === "ok"){
      FB.ok(); showToast("Đã gửi "+out.scans+" scan!", 4000);
      dn.items.forEach(it=>{
        const sessionSL = state.scanList.filter(s=>s.lsx===it.lsx).reduce((a,s)=>a+s.sl, 0);
        it.slDone += sessionSL;
      });
      state.scanList = []; state.expandedDN = {}; renderAll(); setHint("ok","Đã gửi kết quả thành công!");
    } else { FB.err(); showToast("Lỗi: "+(out.error||"Không rõ"), 4000); }
  }catch(e){ FB.err(); showToast("Mất mạng — chưa gửi được.", 4000); }
  btn.disabled = false; btn.innerHTML = '&#128228; Gửi kết quả';
}

/* === MANUAL INPUT === */
function openManual(){
  const sel = document.getElementById("mLSX");
  sel.innerHTML = '<option value="">- Chọn LSX -</option>';
  if(state.currentDN && state.currentDN.items){
    let hasOption = false;
    state.currentDN.items.forEach(it=>{
      const sessionSL = state.scanList.filter(s=>s.lsx===it.lsx).reduce((a,s)=>a+s.sl, 0);
      const totalDone = it.slDone + sessionSL;
      if(totalDone < it.slYC){
        const opt = document.createElement("option");
        opt.value = it.lsx;
        opt.textContent = it.lsx + " (còn " + fmt(it.slYC - totalDone) + ")";
        sel.appendChild(opt);
        hasOption = true;
      }
    });
    if(!hasOption){
      const opt = document.createElement("option");
      opt.value = ""; opt.disabled = true;
      opt.textContent = "Tất cả LSX đã đủ số lượng";
      sel.appendChild(opt);
    }
  }
  document.getElementById("mSL").value = "";
  const err=document.getElementById("manualErr"); err.style.display="none";
  document.getElementById("manualOverlay").classList.add("active");
  setTimeout(()=>document.getElementById("mSL").focus(),200);
}
function closeManual(){ document.getElementById("manualOverlay").classList.remove("active"); }
function submitManual(){
  const lsx = document.getElementById("mLSX").value.trim();
  const slStr = document.getElementById("mSL").value.trim();
  const err = document.getElementById("manualErr");
  if(!lsx){ err.textContent="Chọn LSX"; err.style.display="block"; return; }
  const sl = parseFloat(slStr.replace(",","."));
  if(isNaN(sl) || sl <= 0){ err.textContent="Số lượng phải > 0"; err.style.display="block"; return; }
  closeManual();
  addScanItem(lsx, sl, "MANUAL/"+lsx+"/"+sl);
}

/* === HISTORY === */
async function openHistory(){
  const dn = state.currentDN;
  if(!dn){ showToast("Chưa chọn DN", 2000); return; }
  state.historyFrom = "scan";
  show("screenHistory");
  document.getElementById("histTitle").textContent = dn.dn;
  document.getElementById("histContent").innerHTML = '<div class="hint info">Đang tải lịch sử...</div>';
  try{
    const res = await fetch(CONFIG.XUAT_HANG_URL+"?action=dnhistory&dn="+encodeURIComponent(dn.dn)+"&t="+Date.now());
    const out = await res.json();
    if(out.result==="ok") renderHistory(out);
    else document.getElementById("histContent").innerHTML='<div class="hint err">'+esc(out.error||"Lỗi")+'</div>';
  }catch(e){
    document.getElementById("histContent").innerHTML='<div class="hint err">Không kết nối được.</div>';
  }
}

function openHistoryFromList(dnCode){
  state.historyFrom = "list";
  state.currentDN = { dn: dnCode };
  show("screenHistory");
  document.getElementById("histTitle").textContent = dnCode;
  document.getElementById("histContent").innerHTML = '<div class="hint info">Đang tải lịch sử...</div>';
  fetch(CONFIG.XUAT_HANG_URL+"?action=dnhistory&dn="+encodeURIComponent(dnCode)+"&t="+Date.now())
    .then(r=>r.json()).then(out=>{
      if(out.result==="ok") renderHistory(out);
      else document.getElementById("histContent").innerHTML='<div class="hint err">'+esc(out.error||"Lỗi")+'</div>';
    }).catch(()=>{
      document.getElementById("histContent").innerHTML='<div class="hint err">Không kết nối được.</div>';
    });
}

function renderHistory(data){
  const wrap = document.getElementById("histContent");
  const logs = data.logs || [];
  if(logs.length === 0){
    wrap.innerHTML='<div class="hist-empty">Chưa có lịch sử scan nào.</div>';
    return;
  }
  let html = '<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Tổng: '+logs.length+' lần scan</div>';
  logs.forEach(l=>{
    let kqBadge = '';
    if(l.kq === "Du") kqBadge = ' <span class="lsx-badge badge-done">Đủ</span>';
    else if(l.kq === "Vuot") kqBadge = ' <span class="lsx-badge badge-over">Vượt</span>';
    else if(l.kq === "Thieu") kqBadge = ' <span class="lsx-badge badge-ok">Thiếu</span>';

    html += '<div class="hist-row">'+
      '<div class="hist-lsx">'+esc(l.lsx)+' <span style="color:var(--teal);font-size:14px">x'+fmt(l.sl)+'</span>'+kqBadge+'</div>'+
      '<div class="hist-detail">'+esc(l.user)+' — '+esc(l.time)+(l.kl ? ' | KL: '+fmt(l.kl)+'kg' : '')+'</div>'+
    '</div>';
  });
  wrap.innerHTML = html;
}

function backFromHistory(){
  if(state.historyFrom === "scan") show("screenScan");
  else show("screenDN");
}

/* === HELPERS === */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,"&quot;");}
function fmt(n){return n%1===0?String(n):n.toFixed(1);}
function nowStr(){
  const d=new Date();
  const dd=("0"+d.getDate()).slice(-2), mm=("0"+(d.getMonth()+1)).slice(-2), yy=d.getFullYear();
  const hh=("0"+d.getHours()).slice(-2), mi=("0"+d.getMinutes()).slice(-2), ss=("0"+d.getSeconds()).slice(-2);
  return dd+"/"+mm+"/"+yy+" "+hh+":"+mi+":"+ss;
}

/* === BOOT === */
document.getElementById("mSL").addEventListener("keydown",function(ev){
  if(ev.key==="Enter"){ev.preventDefault();submitManual();}
});
function boot(){
  if(!checkSession()){ window.location.href="index.html"; return; }
  loadDnList();
}
boot();
